name: Validate Skills and Docs

on:
  push:
    branches: [main]
    paths:
      - '*/SKILL.md'
      - 'scripts/*.py'
      - 'docs/**'
      - 'README.md'
  pull_request:
    branches: [main]
    paths:
      - '*/SKILL.md'
      - 'scripts/*.py'
      - 'docs/**'
      - 'README.md'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run unified validation
        run: python scripts/unified_check.py --ci --json > validation-report.json

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: validation-report.json
          retention-days: 7

      - name: Check validation results
        run: |
          if [ -f validation-report.json ]; then
            valid=$(python -c "import json; print(json.load(open('validation-report.json'))['valid'])")
            if [ "$valid" != "True" ]; then
              echo "❌ Validation failed"
              cat validation-report.json
              exit 1
            fi
          fi
